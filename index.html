<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GOMOKU v3.0.14</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="style.css?v=3.0.13">
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js" defer></script>
  <script src="firebase-config.js?v=3.0.13" defer></script>
  <script src="online-service.js?v=3.0.13" defer></script>
  <script src="room-manager.js?v=3.0.13" defer></script>
  <script src="online-controller.js?v=3.0.13" defer></script>
  <script src="script.js?v=3.0.13" defer></script>
</head>
<body>
  <main class="app" id="app">
    <section class="home-screen screen is-active" id="homeScreen" aria-labelledby="homeTitle">
      <div class="home-copy">
        <div class="product-logo" aria-label="GOMOKU">
          <span class="logo-stones" aria-hidden="true">
            <span class="logo-stone logo-stone-black"></span>
            <span class="logo-stone logo-stone-white"></span>
          </span>
          <span class="logo-word">GOMOKU</span>
        </div>
        <p class="eyebrow">版本 v3.0.14</p>
        <h1 id="homeTitle">GOMOKU</h1>
        <p class="home-summary">支持本地双人、AI 对战和在线联机的五子棋游戏。</p>

        <div class="home-actions" aria-label="首页操作">
          <button class="primary-action large-action" id="localGameButton" type="button">本地双人</button>
          <button class="primary-action large-action ai-action" id="aiGameButton" type="button">人机对战</button>
          <button class="primary-action large-action online-action" id="onlineGameButton" type="button">创建房间</button>
          <button class="secondary-action large-action" id="rulesButton" type="button">规则说明</button>
          <button class="secondary-action large-action" id="aboutButton" type="button">关于游戏</button>
        </div>
        <div class="online-entry" id="onlineEntry">
          <div class="online-room-field">
            <label for="roomCodeInput">房间号</label>
            <input id="roomCodeInput" type="text" inputmode="latin" autocomplete="off" maxlength="8" placeholder="ABCDE">
          </div>
          <div class="online-entry-actions">
            <button class="primary-action" id="joinRoomButton" type="button">加入房间</button>
          </div>
          <p class="online-entry-status" id="onlineHomeStatus" aria-live="polite"></p>
        </div>
      </div>

      <div class="home-preview" aria-hidden="true">
        <div class="preview-board">
          <span class="preview-stone preview-black stone-a"></span>
          <span class="preview-stone preview-white stone-b"></span>
          <span class="preview-stone preview-black stone-c"></span>
          <span class="preview-stone preview-white stone-d"></span>
          <span class="preview-stone preview-black stone-e"></span>
        </div>
      </div>
    </section>

    <section class="game-screen screen" id="gameScreen" aria-label="五子棋对局" hidden>
      <header class="game-topbar">
        <button class="ghost-action" id="homeButton" type="button">返回首页</button>
        <div class="brand-lockup">
          <div class="product-logo compact" aria-label="GOMOKU">
            <span class="logo-stones" aria-hidden="true">
              <span class="logo-stone logo-stone-black"></span>
              <span class="logo-stone logo-stone-white"></span>
            </span>
            <span class="logo-word">GOMOKU</span>
          </div>
          <p class="eyebrow" id="modeLabel">版本 v3.0.14</p>
        </div>
        <button class="sound-toggle is-on" id="soundToggleButton" type="button" aria-pressed="true">声音 开</button>
      </header>

      <section class="match-bar" aria-label="对局信息">
        <article class="match-stat">
          <span class="mini-stone is-black" aria-hidden="true"></span>
          <div>
            <p>黑棋胜场</p>
            <strong id="blackWins">0</strong>
          </div>
        </article>
        <article class="match-stat">
          <span class="mini-stone is-white" aria-hidden="true"></span>
          <div>
            <p>白棋胜场</p>
            <strong id="whiteWins">0</strong>
          </div>
        </article>
        <article class="match-stat">
          <p>步数</p>
          <strong id="moveCount">0</strong>
        </article>
        <article class="match-stat">
          <p>计时</p>
          <strong id="timerText">00:00</strong>
        </article>
        <article class="match-stat current-turn" id="turnCard">
          <span class="mini-stone is-black" id="turnStone" aria-hidden="true"></span>
          <div>
            <p>当前回合</p>
            <strong id="turnText">黑棋</strong>
          </div>
        </article>
      </section>

      <div class="game-layout">
        <section class="board-section" aria-label="棋盘">
          <div class="board-frame">
            <div class="board is-black-turn" id="board" role="grid" aria-label="15×15 五子棋棋盘">
              <div class="board-lines" aria-hidden="true"></div>
              <div class="star-points" id="starPoints" aria-hidden="true"></div>
              <div class="intersections" id="intersections"></div>
            </div>
          </div>
        </section>

        <aside class="side-panel" aria-label="游戏控制">
          <div class="online-room-card" id="onlineRoomCard" hidden>
            <p class="panel-label">在线房间</p>
            <strong id="onlineRoomCode">-----</strong>
            <p id="onlineRoomMeta">未连接</p>
            <p id="onlineOpponentStatus" aria-live="polite"></p>
            <div class="online-room-actions">
              <button class="secondary-action" id="copyRoomCodeButton" type="button">复制房间号</button>
              <button class="ghost-action" id="leaveRoomButton" type="button">离开房间</button>
            </div>
          </div>

          <div class="status-card">
            <p class="panel-label">状态</p>
            <p class="status-text" id="gameStatus">对局进行中</p>
          </div>

          <dl class="stats-list">
            <div class="stat-row">
              <dt>最后一步</dt>
              <dd id="lastMove">暂无</dd>
            </div>
            <div class="stat-row">
              <dt>总手数</dt>
              <dd id="sideMoveCount">0</dd>
            </div>
            <div class="stat-row">
              <dt>本局用时</dt>
              <dd id="sideTimerText">00:00</dd>
            </div>
          </dl>

          <div class="panel-actions">
            <button class="secondary-action" id="undoButton" type="button" disabled>悔棋</button>
            <button class="primary-action" id="resetButton" type="button">重新开始</button>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <div class="modal" id="appModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-card">
      <p class="modal-kicker" id="modalKicker">提示</p>
      <h2 id="modalTitle">标题</h2>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>
</body>
</html>
